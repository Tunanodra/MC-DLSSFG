name: Build Native Libraries

on:
  workflow_dispatch:

jobs:
  build-linux:
    if: ${{ !contains(github.event.head_commit.message, 'SKIP') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake build-essential ninja-build

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@033219e2d69dd4d3e873e217eb385fdd4b4438f4
        with:
          version: 1.4.321.1
          cache: true
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Set up Clang
        uses: egor-tensin/setup-clang@v1
        with:
          version: latest

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-includes: |
            caches
            notifications
            wrapper
          gradle-home-cache-excludes: |
            caches/build-cache-1

      - name: Restore native cache (Linux)
        id: native-cache-linux
        uses: actions/cache@v4
        with:
          path: |
            common/src/main/resources/lib
          key: native-libs-linux-${{ hashFiles('native/**') }}
          restore-keys: |
            native-libs-linux-

      - name: Install Python packages
        if: steps.native-cache-linux.outputs.cache-hit != 'true'
        run: pip install pyyaml simplejson

      - name: Initialize
        if: steps.native-cache-linux.outputs.cache-hit != 'true'
        working-directory: native/cpp
        run: python init.py

      - name: Build native libraries (Linux)
        if: steps.native-cache-linux.outputs.cache-hit != 'true'
        id: build
        run: ./gradlew buildNative
        continue-on-error: true

      - name: Upload Linux native libraries
        uses: actions/upload-artifact@v4
        with:
          name: native-libs-linux
          path: |
            common/src/main/resources/lib/**/*
          if-no-files-found: error

  build-windows:
    if: ${{ !contains(github.event.head_commit.message, 'SKIP') }}
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@033219e2d69dd4d3e873e217eb385fdd4b4438f4
        with:
          version: 1.4.321.1
          cache: true
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-includes: |
            caches
            notifications
            wrapper
          gradle-home-cache-excludes: |
            caches/build-cache-1

      - name: Restore native cache (Windows)
        id: native-cache-windows
        uses: actions/cache@v4
        with:
          path: |
            common/src/main/resources/lib
          key: native-libs-windows-${{ hashFiles('native/**') }}
          restore-keys: |
            native-libs-windows-

      - name: Install Python packages
        if: steps.native-cache-windows.outputs.cache-hit != 'true'
        run: pip install pyyaml simplejson

      - name: Initialize
        if: steps.native-cache-windows.outputs.cache-hit != 'true'
        working-directory: native/cpp
        run: python init.py

      - name: Build native libraries (Windows)
        if: steps.native-cache-windows.outputs.cache-hit != 'true'
        id: build
        run: .\gradlew.bat buildNative
        continue-on-error: true

      - name: Upload Windows native libraries
        uses: actions/upload-artifact@v4
        with:
          name: native-libs-windows
          path: |
            common/src/main/resources/lib/**/*
          if-no-files-found: error

  upload-artifacts:
    needs: [ build-linux, build-windows ]
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: native-libs-linux
          path: artifacts/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: native-libs-windows
          path: artifacts/windows

      - name: Upload combined artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-libraries-all
          path: artifacts/**/*