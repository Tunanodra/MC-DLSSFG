name: Build and Upload Artifacts

on:
  workflow_dispatch:
    inputs:
      name:
        description: "name"
        required: true
      tag_name:
        description: "tag_name"
        required: true

jobs:
  build-native-linux:
    if: ${{ !contains(github.event.head_commit.message, 'SKIP') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore native cache (Linux)
        id: native-cache-linux
        uses: actions/cache@v4
        with:
          path: |
            common/src/main/resources/lib
          key: native-libs-linux-${{ hashFiles('native/**') }}
          restore-keys: |
            native-libs-linux-

      - name: Install dependencies
        if: steps.native-cache-linux.outputs.cache-hit != 'true'
        run: |
          sudo apt update
          sudo apt install -y cmake build-essential ninja-build

      - name: Install Vulkan SDK
        if: steps.native-cache-linux.outputs.cache-hit != 'true'
        uses: humbletim/install-vulkan-sdk@033219e2d69dd4d3e873e217eb385fdd4b4438f4
        with:
          version: 1.4.321.1
          cache: true

      - name: Validate Gradle wrapper
        if: steps.native-cache-linux.outputs.cache-hit != 'true'
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 21
        if: steps.native-cache-linux.outputs.cache-hit != 'true'
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Set up Clang
        if: steps.native-cache-linux.outputs.cache-hit != 'true'
        uses: egor-tensin/setup-clang@v1
        with:
          version: latest

      - name: Setup Gradle
        if: steps.native-cache-linux.outputs.cache-hit != 'true'
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-includes: |
            caches
            notifications
            wrapper
          gradle-home-cache-excludes: |
            caches/build-cache-1

      - name: Install Python packages
        if: steps.native-cache-linux.outputs.cache-hit != 'true'
        run: pip install pyyaml simplejson

      - name: Initialize
        if: steps.native-cache-linux.outputs.cache-hit != 'true'
        working-directory: native/cpp
        run: python init.py

      - name: Build native libraries (Linux)
        if: steps.native-cache-linux.outputs.cache-hit != 'true'
        id: build
        run: ./gradlew buildNative
        continue-on-error: true

      - name: Upload Linux native libraries
        uses: actions/upload-artifact@v4
        with:
          name: native-libs-linux
          path: |
            common/src/main/resources/lib/**/*
          if-no-files-found: error

  build-native-windows:
    if: ${{ !contains(github.event.head_commit.message, 'SKIP') }}
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore native cache (Windows)
        id: native-cache-windows
        uses: actions/cache@v4
        with:
          path: |
            common/src/main/resources/lib
          key: native-libs-windows-${{ hashFiles('native/**') }}
          restore-keys: |
            native-libs-windows-

      - name: Install Vulkan SDK
        if: steps.native-cache-windows.outputs.cache-hit != 'true'
        uses: humbletim/install-vulkan-sdk@033219e2d69dd4d3e873e217eb385fdd4b4438f4
        with:
          version: 1.4.321.1
          cache: true

      - name: Validate Gradle wrapper
        if: steps.native-cache-windows.outputs.cache-hit != 'true'
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 21
        if: steps.native-cache-windows.outputs.cache-hit != 'true'
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        if: steps.native-cache-windows.outputs.cache-hit != 'true'
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-includes: |
            caches
            notifications
            wrapper
          gradle-home-cache-excludes: |
            caches/build-cache-1

      - name: Install Python packages
        if: steps.native-cache-windows.outputs.cache-hit != 'true'
        run: pip install pyyaml simplejson

      - name: Initialize
        if: steps.native-cache-windows.outputs.cache-hit != 'true'
        working-directory: native/cpp
        run: python init.py

      - name: Build native libraries (Windows)
        if: steps.native-cache-windows.outputs.cache-hit != 'true'
        id: build
        run: .\gradlew.bat buildNative
        continue-on-error: true

      - name: Upload Windows native libraries
        uses: actions/upload-artifact@v4
        with:
          name: native-libs-windows
          path: |
            common/src/main/resources/lib/**/*
          if-no-files-found: error

  build-and-upload:
    needs: [build-native-linux, build-native-windows]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Linux native libraries
        uses: actions/download-artifact@v4
        with:
          name: native-libs-linux
          path: common/src/main/resources/lib

      - name: Download Windows native libraries
        uses: actions/download-artifact@v4
        with:
          name: native-libs-windows
          path: common/src/main/resources/lib

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build all versions
        id: build
        if: ${{ !cancelled() }}
        run: ./gradlew buildAllVersions
        continue-on-error: true

      - name: Find latest changelog
        id: changelog
        run: echo "LATEST_CHANGELOG=$(python3 .github/scripts/find_latest_changelog.py changelogs)" >> $GITHUB_OUTPUT

      - name: Upload Artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.event.inputs.name }}
          tag_name: ${{ github.event.inputs.tag_name }}
          token: ${{ secrets.TOKEN }}
          body_path: ./changelogs/${{ steps.changelog.outputs.LATEST_CHANGELOG }}
          files: |
            ./build_jars/**
            ./changelogs/${{ steps.changelog.outputs.LATEST_CHANGELOG }}