name: Build

on:
  push:
    branches: [ '*' ]

jobs:
  build-native-linux:
    if: ${{ !contains(github.event.head_commit.message, 'SKIP') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore native cache (Linux)
        id: native-cache-linux
        uses: actions/cache@v4
        with:
          path: |
            common/src/main/resources/lib
          key: native-libs-linux-${{ hashFiles('native/**') }}
          restore-keys: |
            native-libs-linux-

      - name: Install dependencies
        if: steps.native-cache-linux.outputs.cache-hit != 'true'
        run: |
          sudo apt update
          sudo apt install -y cmake build-essential ninja-build

      - name: Install Vulkan SDK
        if: steps.native-cache-linux.outputs.cache-hit != 'true'
        uses: humbletim/install-vulkan-sdk@033219e2d69dd4d3e873e217eb385fdd4b4438f4
        with:
          version: 1.4.321.1
          cache: true

      - name: Validate Gradle wrapper
        if: steps.native-cache-linux.outputs.cache-hit != 'true'
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 21
        if: steps.native-cache-linux.outputs.cache-hit != 'true'
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Set up Clang
        if: steps.native-cache-linux.outputs.cache-hit != 'true'
        uses: egor-tensin/setup-clang@v1
        with:
          version: latest

      - name: Setup Gradle
        if: steps.native-cache-linux.outputs.cache-hit != 'true'
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-includes: |
            caches
            notifications
            wrapper
          gradle-home-cache-excludes: |
            caches/build-cache-1

      - name: Install Python packages
        if: steps.native-cache-linux.outputs.cache-hit != 'true'
        run: pip install pyyaml simplejson

      - name: Initialize
        if: steps.native-cache-linux.outputs.cache-hit != 'true'
        working-directory: native/cpp
        run: python init.py

      - name: Build native libraries (Linux)
        if: steps.native-cache-linux.outputs.cache-hit != 'true'
        id: build
        run: ./gradlew buildNative
        continue-on-error: true

      - name: Upload Linux native libraries
        uses: actions/upload-artifact@v4
        with:
          name: native-libs-linux
          path: |
            common/src/main/resources/lib/**/*.so
          if-no-files-found: error

  build-native-windows:
    if: ${{ !contains(github.event.head_commit.message, 'SKIP') }}
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore native cache (Windows)
        id: native-cache-windows
        uses: actions/cache@v4
        with:
          path: |
            common/src/main/resources/lib
          key: native-libs-windows-${{ hashFiles('native/**') }}
          restore-keys: |
            native-libs-windows-

      - name: Install Vulkan SDK
        if: steps.native-cache-windows.outputs.cache-hit != 'true'
        uses: humbletim/install-vulkan-sdk@033219e2d69dd4d3e873e217eb385fdd4b4438f4
        with:
          version: 1.4.321.1
          cache: true

      - name: Validate Gradle wrapper
        if: steps.native-cache-windows.outputs.cache-hit != 'true'
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 21
        if: steps.native-cache-windows.outputs.cache-hit != 'true'
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        if: steps.native-cache-windows.outputs.cache-hit != 'true'
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-includes: |
            caches
            notifications
            wrapper
          gradle-home-cache-excludes: |
            caches/build-cache-1

      - name: Install Python packages
        if: steps.native-cache-windows.outputs.cache-hit != 'true'
        run: pip install pyyaml simplejson

      - name: Initialize
        if: steps.native-cache-windows.outputs.cache-hit != 'true'
        working-directory: native/cpp
        run: python init.py

      - name: Build native libraries (Windows)
        if: steps.native-cache-windows.outputs.cache-hit != 'true'
        id: build
        run: .\gradlew.bat buildNative
        continue-on-error: true

      - name: Upload Windows native libraries
        uses: actions/upload-artifact@v4
        with:
          name: native-libs-windows
          path: |
            common/src/main/resources/lib/**/*.dll
          if-no-files-found: error

  build:
    if: ${{ !contains(github.event.head_commit.message, 'SKIP') }}
    needs: [build-native-linux, build-native-windows]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Linux native libraries
        uses: actions/download-artifact@v4
        with:
          name: native-libs-linux
          path: common/src/main/resources/lib

      - name: Download Windows native libraries
        uses: actions/download-artifact@v4
        with:
          name: native-libs-windows
          path: common/src/main/resources/lib

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Set up Clang
        uses: egor-tensin/setup-clang@v1
        with:
          version: latest

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-includes: |
            caches
            notifications
            wrapper
          gradle-home-cache-excludes: |
            caches/build-cache-1

      - name: Build
        id: build
        if: ${{ !cancelled() }}
        run: ./gradlew buildAllVersions
        continue-on-error: true
        
      - name: Install @actions/artifact
        run: npm install @actions/artifact@2

      - name: Upload JARs individually
        uses: actions/github-script@v7
        with:
          script: |
            const {DefaultArtifactClient} = require('@actions/artifact')
            const fs = require('fs')
            const path = require('path')

            const client = new DefaultArtifactClient()
            const buildDir = path.join(process.env.GITHUB_WORKSPACE, 'build_jars')

            if (!fs.existsSync(buildDir)) {
              core.warning('build_jars directory not found, skipping upload')
              return
            }

            const jars = fs.readdirSync(buildDir).filter(f => f.endsWith('.jar'))
            core.info(`Found ${jars.length} JAR(s) to upload`)

            for (const jar of jars) {
              const name = path.basename(jar, '.jar')
              const filePath = path.join(buildDir, jar)
              core.info(`Uploading: ${jar}`)
              await client.uploadArtifact(name, [filePath], buildDir, {
                compressionLevel: 0
              })
            }

            core.info(`Successfully uploaded ${jars.length} artifact(s)`)

      - name: Install Python dependencies for uploader
        run: pip install boto3 pycryptodome requests

      - name: Upload JARs via script
        env:
          SR_API_ENDPOINT: ${{ secrets.SR_API_URL }}
          SR_API_TOKEN: ${{ secrets.SR_API_TOKEN }}
        run: python script/action_uploader.py --repo_dir ${{ github.workspace }} --target_dir ./build_jars --nightly